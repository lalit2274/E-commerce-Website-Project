<script>
    let params = new URLSearchParams(window.location.search)
let product_id = params.get("id")

fetch("get_products.php")
.then(res=>res.json())
.then(products=>{

let product = products.find(p => Number(p.id) === Number(product_id))

if(!product){
document.getElementById("productDetails").innerHTML = "Product not found"
return
}
let html = `
<div class="product-details">

    <div class="product-image">
        <img src="${product.image || 'https://via.placeholder.com/300'}">
    </div>

    <div class="product-info">
        <h1>${product.name}</h1>
        <h2>₹${product.price}</h2>
        <p>${product.description}</p>

        <button onclick="addToCart(${product.id})">Add To Cart</button>
        <button onclick="buyNow(${product.id})">Buy Now</button>
    </div>

</div>
`

document.getElementById("productDetails").innerHTML = html

})


/* BUY NOW */

function buyNow(product_id){

let user = localStorage.getItem("loginUser")

if(!user){
alert("Please Login First")
window.location.href="login.html"
return
}

window.location.href="checkout.html?id="+product_id

}

</script>
