<script>
 
fetch("get_products.php")
.then(res=>res.json())
.then(products=>{

let html=""

products.forEach(p=>{

if(p.category=="Furniture"){
html+=`

<div class="product">

<a href="product.html?id=${p.id}">

<img src="${p.image || 'https://via.placeholder.com/150'}" width="150">
<h3>${p.name}</h3>

</a>

<p>₹${p.price}</p>

<button onclick="addToCart(${p.id})">Add To Cart</button>

</div>

`

}
})

document.getElementById("products").innerHTML = html

})


function searchProduct(){

let search = document.getElementById("searchBox").value.toLowerCase()

fetch("get_products.php")
.then(res=>res.json())
.then(products=>{

let html=""

products.forEach(p=>{

if(p.category=="Furniture" && p.name.toLowerCase().includes(search)){

html+=`
<div class="product">
<img src="${p.image || 'https://via.placeholder.com/150'}" width="150">
<h3>${p.name}</h3>
<p>₹${p.price}</p>
<button onclick="addToCart(${p.id})">Add To Cart</button>
</div>
`

}

})

document.getElementById("products").innerHTML = html

})

}




</script>
