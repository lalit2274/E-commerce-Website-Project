            /* Orders Container */
#orders {
    display: flex;
    flex-direction: column;
    gap: 20px;
    padding: 20px;
}

/* Order Card */
.order-card {
    display: flex;
    align-items: center;
    gap: 20px;
    background: #f5f5f5;
    padding: 15px;
    border-radius: 10px;
    width: 600px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}

/* Product Image */
.order-card img {
    width: 100px;
    height: 120px;
    object-fit: cover;
    border-radius: 8px;
}

/* Text */
.order-card h2 {
    font-size: 18px;
    margin: 0;
}

/* Order Actions */
.order-actions {
    margin-left: auto;
    display: flex;
    flex-direction: column;
    gap: 10px;
}

/* Buttons */
.order-actions button {
    padding: 8px 12px;
    border: none;
    border-radius: 20px;
    background: #ffc107;
    cursor: pointer;
}

 <h1>My Orders</h1>

<div id="orders"></div>

<script>
function loadOrders(){

let user_id = localStorage.getItem("loginUser")

if(!user_id){
alert("Please Login First")
window.location.href="login.html"
return
}

fetch("get_orders.php?user_id="+user_id)
.then(res=>res.json())
.then(data=>{

let html=""

data.forEach((o)=>{

html+=`

<div class="order-card">

<img src="${o.image}">
<h2>${o.name}</h2>

<p>₹${o.price}</p>
<p>${o.status}</p>
<p>${o.payment_method}</p>

<div class="order-actions">
<button onclick="cancelOrder(${o.id})">Cancel</button>
<button onclick="trackOrder('${o.status}')">Track</button>
</div>

</div>

`

})

document.getElementById("orders").innerHTML = html

})

}


/* CANCEL ORDER */
function cancelOrder(order_id){

fetch("cancel_order.php",{
method:"POST",
headers:{
"Content-Type":"application/x-www-form-urlencoded"
},
body: `order_id=${order_id}`
})
.then(res=>res.text())
.then(data=>{
alert("Order Cancelled")
loadOrders()
})

}

/* TRACK ORDER */
function trackOrder(status){

alert("Order Status: " + status)

}
</script>
